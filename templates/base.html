<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyTube{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/browse.css">
</head>
<body>
    <header>
        <div class="container-full">
            <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
                <span></span><span></span><span></span>
            </button>

            <a href="/" class="logo" style="text-decoration:none;"><span class="logo-icon">▶</span> MyTube</a>

            {% block header_search %}
            <div class="header-search">
                <span class="search-icon">&#128269;</span>
                <input type="text"
                       id="header-search"
                       placeholder="Suchen... (Titel, Kanal, Tags, Kategorie)"
                       value="{{ q if q is defined else '' }}"
                       autocomplete="off">
            </div>
            {% endblock %}

            <div class="header-right">
                {% block header_right %}{% endblock %}
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside id="sidebar" class="sidebar">
            <nav class="sidebar-nav">
                <a href="/" class="sidebar-link {% if request.path == '/' and not category_filter and not request.args.get('q') %}active{% endif %}">
                    <span class="sidebar-icon">&#127968;</span> Startseite
                </a>
                <a href="/?sort=processed_date&dir=desc" class="sidebar-link">
                    <span class="sidebar-icon">&#128340;</span> Zuletzt verarbeitet
                </a>
                <a href="/stats" class="sidebar-link {% if request.path == '/stats' %}active{% endif %}">
                    <span class="sidebar-icon">&#128202;</span> Statistiken
                </a>

                <hr class="sidebar-divider">
                <div class="sidebar-section-title">Kategorien</div>

                {% include "partials/sidebar_tree.html" %}
            </nav>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="/static/browse.js" defer></script>
</body>
</html>
