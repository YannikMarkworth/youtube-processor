<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YouTube Processor{% endblock %}</title>
    <link rel="stylesheet" href="/static/browse.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo" style="text-decoration:none;"><span>YT</span> Processor</a>

            {% block header_search %}
            <div class="header-search">
                <span class="search-icon">&#128269;</span>
                <input type="text"
                       id="header-search"
                       placeholder="Suchen... (Titel, Kanal, Tags, Kategorie)"
                       value="{{ q if q is defined else '' }}"
                       autocomplete="off">
            </div>
            {% endblock %}

            <div class="header-right">
                {% block header_right %}{% endblock %}
            </div>
        </div>
    </header>

    {% block chips %}{% endblock %}

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="/static/browse.js" defer></script>
</body>
</html>
